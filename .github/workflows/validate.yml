name: Validate

on:
    pull_request:
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"
    push:
        branches: [main]
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"

permissions:
    contents: read

jobs:
    github-actions:
        name: GitHub Actions Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Lint workflow files
              uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
              with:
                  args: -color

    python:
        name: Python Formatting and Tests
        runs-on: ubuntu-latest
        env:
            PYTHONPATH: scripts

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: "3.14"
                  cache: pip

            - name: Install validation dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e ".[dev]"

            - name: Check formatting
              run: black --check scripts tests

            - name: Run unit tests
              run: pytest

    dotnet:
        name: CSharpier Formatting Check
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Set up .NET
              uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore local .NET tools
              run: dotnet tool restore

            - name: Check C# formatting
              run: dotnet csharpier check viewer

    docker:
        name: Dockerfile Build Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

            - name: Build generator image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
              with:
                  context: ./scripts
                  file: ./scripts/Dockerfile
                  push: false
                  load: false

            - name: Build tiles image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
              with:
                  context: .
                  file: ./tiles/Dockerfile
                  push: false
                  load: false
