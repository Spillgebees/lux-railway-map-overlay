name: Validate

on:
    pull_request:
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"
    push:
        branches: [main]
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"

permissions:
    contents: read

jobs:
    github-actions:
        name: GitHub Actions Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Lint workflow files
              uses: docker://rhysd/actionlint:1.7.11
              with:
                  args: -color

    python:
        name: Python Formatting and Tests
        runs-on: ubuntu-latest
        env:
            PYTHONPATH: scripts

        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version: "3.13"
                  cache: pip

            - name: Install validation dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e ".[dev]"

            - name: Check formatting
              run: black --check scripts tests

            - name: Run unit tests
              run: pytest

    dotnet:
        name: CSharpier Formatting Check
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Set up .NET
              uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore local .NET tools
              run: dotnet tool restore

            - name: Check C# formatting
              run: dotnet csharpier check viewer

    docker:
        name: Dockerfile Build Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

            - name: Build generator image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: ./scripts
                  file: ./scripts/Dockerfile
                  push: false
                  load: false

            - name: Build tiles image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: ./tiles/Dockerfile
                  push: false
                  load: false
