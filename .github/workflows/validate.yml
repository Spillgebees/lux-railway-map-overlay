name: Validate

on:
    pull_request:
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"
    push:
        branches: [main]
        paths:
            - ".dockerignore"
            - ".config/dotnet-tools.json"
            - ".github/workflows/validate.yml"
            - ".github/workflows/publish-image.yml"
            - "scripts/**"
            - "tests/**"
            - "styles/**"
            - "tiles/**"
            - "viewer/**"

permissions:
    contents: read

jobs:
    github-actions:
        name: GitHub Actions Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Lint workflow files
              uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
              with:
                  args: -color

    python:
        name: Python Formatting and Tests
        runs-on: ubuntu-latest
        env:
            PYTHONPATH: scripts

        steps:
            - name: Check out repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.14"
                  cache: pip

            - name: Install validation dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e ".[dev]"

            - name: Check formatting
              run: black --check scripts tests

            - name: Run unit tests
              run: pytest

    dotnet:
        name: CSharpier Formatting Check
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Set up .NET
              uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore local .NET tools
              run: dotnet tool restore

            - name: Check C# formatting
              run: dotnet csharpier check viewer

    docker:
        name: Dockerfile Build Validation
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  persist-credentials: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Build generator image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: ./scripts
                  file: ./scripts/Dockerfile
                  push: false
                  load: false

            - name: Build tiles image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: .
                  file: ./tiles/Dockerfile
                  push: false
                  load: false
