apiVersion: v1
kind: Service
metadata:
  name: {{ include "lux-railway-map-overlay.fullname" . }}
  labels:
    {{- include "lux-railway-map-overlay.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "lux-railway-map-overlay.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
