# Custom GDAL OSM driver configuration for railway data extraction.
#
# This file controls which OSM attributes are exposed as fields when ogr2ogr
# reads PBF files. The default osmconf.ini only exposes a limited set of
# attributes: this version adds railway-specific tags needed for styling
# and data export.
#
# Usage:
#   OGR_CONFIG_FILE=scripts/osmconf.ini ogr2ogr ...
#   ogr2ogr --config OSM_CONFIG_FILE scripts/osmconf.ini ...
#
# Data: (c) OpenStreetMap contributors

[general]
attribution=Map data (c) OpenStreetMap contributors
report_all_nodes=no
report_all_ways=no
all_layers=no
# Treat closed ways with these tags as polygons (not lines).
# Extends GDAL's default list with railway=platform so platform ways become polygons.
closed_ways_are_polygons=aeroway,amenity,boundary,building,craft,geological,historic,landuse,leisure,military,natural,office,place,shop,sport,tourism,highway=platform,public_transport=platform,railway=platform

[points]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,ref,railway,operator,network,network:short,public_transport,railway:ref,uic_ref,uic_name,station,platforms,wikidata,crossing:barrier,crossing:bell,crossing:light,supervised
unsignificant_wkb_point=yes

[lines]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,ref,railway,construction,proposed,disused,abandoned,usage,service,highspeed,tunnel,bridge,electrified,voltage,frequency,gauge,maxspeed,operator,tracks,cutting,embankment,railway:preserved,railway:traffic_mode,rack,surface,height,width,tunnel:name

[multipolygons]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,railway,operator,landuse,ref,surface,height,width,wheelchair,tactile_paving,shelter

[multilinestrings]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,railway

[other_relations]
osm_id=yes
osm_version=no
osm_timestamp=no
osm_uid=no
osm_user=no
osm_changeset=no
attributes=name,railway,type
